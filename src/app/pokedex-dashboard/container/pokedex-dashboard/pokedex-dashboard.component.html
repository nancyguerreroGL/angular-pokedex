<div *ngIf="isLoading" class="loader-container">
    <svg class="pokeball-loader" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Top half (red) -->
        <path d="M 50 5 A 45 45 0 0 1 95 50 L 62 50 A 12 12 0 0 0 38 50 L 5 50 A 45 45 0 0 1 50 5 Z" fill="#e63946"/>
        <!-- Bottom half (white) -->
        <path d="M 50 95 A 45 45 0 0 1 5 50 L 38 50 A 12 12 0 0 0 62 50 L 95 50 A 45 45 0 0 1 50 95 Z" fill="#f1faee"/>
        <!-- Middle black band -->
        <path d="M 5 47 L 38 47 A 12 12 0 0 0 38 53 L 5 53 A 45 45 0 0 1 5 47 Z" fill="#1d3557"/>
        <path d="M 95 47 L 62 47 A 12 12 0 0 0 62 53 L 95 53 A 45 45 0 0 1 95 47 Z" fill="#1d3557"/>
        <!-- Center button outer ring -->
        <circle cx="50" cy="50" r="14" fill="#1d3557"/>
        <!-- Center button inner -->
        <circle cx="50" cy="50" r="9" fill="#f1faee"/>
        <!-- Outer border -->
        <circle cx="50" cy="50" r="45" fill="none" stroke="#1d3557" stroke-width="4"/>
    </svg>
    <p class="loader-text">Loading Pokémon...</p>
</div>

<ul *ngIf="!isLoading && pokemonList && pokemonList.length > 0" class="pokemon-results">
    <li class="pokemon-figure" *ngFor="let pokemon of pokemonList">
        <pokemon-detail [detail]="pokemon"></pokemon-detail>
        <div class="pokemon-detail">
            <h5>{{pokemon.name}}</h5>
        </div>
    </li>
</ul>
